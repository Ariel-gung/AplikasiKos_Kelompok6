<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>UML Diagrams - AplikasiKos Kelompok X</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 40px;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .section {
            margin-bottom: 50px;
            page-break-inside: avoid;
        }
        h2 {
            color: #202124;
            border-bottom: 2px solid #e8eaed;
            padding-bottom: 8px;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .diagram-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
        }
        svg {
            max-width: 100%;
            height: auto;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #e8eaed;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Arsitektur Teknis AplikasiKos</h1>
        <div class="subtitle">Dokumentasi UML (Use Case & Class Diagram) Kelompok X - PBO</div>

        <!-- Use Case Diagram Section -->
        <div class="section">
            <h2>1. Use Case Diagram</h2>
            <div class="diagram-wrapper">
                <svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background Grid or Border -->
                    <rect x="0" y="0" width="700" height="400" fill="none" />
                    
                    <!-- System Boundary -->
                    <rect x="200" y="40" width="300" height="320" rx="10" fill="#ffffff" stroke="#1a73e8" stroke-width="2" />
                    <text x="350" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a73e8" text-anchor="middle">Sistem AplikasiKos</text>

                    <!-- Actor: Pencari Kos (Left) -->
                    <g transform="translate(80, 160)">
                        <!-- Head -->
                        <circle cx="20" cy="20" r="12" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2" />
                        <!-- Body -->
                        <line x1="20" y1="32" x2="20" y2="70" stroke="#1a73e8" stroke-width="2" />
                        <!-- Arms -->
                        <line x1="0" y1="45" x2="40" y2="45" stroke="#1a73e8" stroke-width="2" />
                        <!-- Legs -->
                        <line x1="20" y1="70" x2="5" y2="95" stroke="#1a73e8" stroke-width="2" />
                        <line x1="20" y1="70" x2="35" y2="95" stroke="#1a73e8" stroke-width="2" />
                        <!-- Label -->
                        <text x="20" y="115" font-family="sans-serif" font-size="14" font-weight="bold" fill="#202124" text-anchor="middle">Pencari Kos</text>
                    </g>

                    <!-- Actor: Pemilik Kos (Right) -->
                    <g transform="translate(580, 160)">
                        <!-- Head -->
                        <circle cx="20" cy="20" r="12" fill="#fce8e6" stroke="#d93025" stroke-width="2" />
                        <!-- Body -->
                        <line x1="20" y1="32" x2="20" y2="70" stroke="#d93025" stroke-width="2" />
                        <!-- Arms -->
                        <line x1="0" y1="45" x2="40" y2="45" stroke="#d93025" stroke-width="2" />
                        <!-- Legs -->
                        <line x1="20" y1="70" x2="5" y2="95" stroke="#d93025" stroke-width="2" />
                        <line x1="20" y1="70" x2="35" y2="95" stroke="#d93025" stroke-width="2" />
                        <!-- Label -->
                        <text x="20" y="115" font-family="sans-serif" font-size="14" font-weight="bold" fill="#202124" text-anchor="middle">Pemilik Kos</text>
                    </g>

                    <!-- Use Case: Cari Kamar -->
                    <g id="uc-cari">
                        <ellipse cx="350" cy="90" rx="80" ry="25" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5" />
                        <text x="350" y="94" font-family="sans-serif" font-size="13" fill="#1a73e8" text-anchor="middle" font-weight="500">Cari Kamar</text>
                    </g>

                    <!-- Use Case: Pesan Kamar -->
                    <g id="uc-pesan">
                        <ellipse cx="350" cy="180" rx="80" ry="25" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5" />
                        <text x="350" y="184" font-family="sans-serif" font-size="13" fill="#1a73e8" text-anchor="middle" font-weight="500">Pesan Kamar</text>
                    </g>

                    <!-- Use Case: Kelola Kamar -->
                    <g id="uc-kelola-kamar">
                        <ellipse cx="350" cy="270" rx="80" ry="25" fill="#fce8e6" stroke="#d93025" stroke-width="1.5" />
                        <text x="350" y="274" font-family="sans-serif" font-size="13" fill="#d93025" text-anchor="middle" font-weight="500">Kelola Kamar</text>
                    </g>

                    <!-- Use Case: Kelola Pemesanan (Optional but standard for complete interaction) -->
                    <g id="uc-kelola-pesanan">
                        <ellipse cx="350" cy="330" rx="80" ry="20" fill="#fce8e6" stroke="#d93025" stroke-width="1.5" />
                        <text x="350" y="334" font-family="sans-serif" font-size="12" fill="#d93025" text-anchor="middle" font-weight="500">Kelola Pemesanan</text>
                    </g>

                    <!-- Connectors -->
                    <!-- Pencari Kos -> Cari Kamar -->
                    <line x1="130" y1="205" x2="272" y2="105" stroke="#1a73e8" stroke-width="1.2" />
                    <!-- Pencari Kos -> Pesan Kamar -->
                    <line x1="130" y1="215" x2="270" y2="180" stroke="#1a73e8" stroke-width="1.2" />

                    <!-- Pemilik Kos -> Kelola Kamar -->
                    <line x1="570" y1="215" x2="428" y2="260" stroke="#d93025" stroke-width="1.2" />
                    <!-- Pemilik Kos -> Kelola Pemesanan -->
                    <line x1="570" y1="225" x2="425" y2="320" stroke="#d93025" stroke-width="1.2" />
                </svg>
            </div>
        </div>

        <!-- Class Diagram Section -->
        <div class="section">
            <h2>2. Class Diagram</h2>
            <div class="diagram-wrapper">
                <svg width="700" height="420" viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
                    <!-- Class: User (Top-Left) -->
                    <g transform="translate(40, 40)">
                        <!-- Header -->
                        <rect x="0" y="0" width="180" height="30" fill="#1a73e8" rx="4" ry="4" />
                        <text x="90" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">User</text>
                        <!-- Attributes Box -->
                        <rect x="0" y="30" width="180" height="85" fill="#f8f9fa" stroke="#bdc1c6" stroke-width="1" />
                        <text x="10" y="50" font-family="monospace" font-size="12" fill="#202124">- userId: String</text>
                        <text x="10" y="70" font-family="monospace" font-size="12" fill="#202124">- nama: String</text>
                        <text x="10" y="90" font-family="monospace" font-size="12" fill="#202124">- email: String</text>
                        <text x="10" y="105" font-family="monospace" font-size="12" fill="#202124">- role: String</text>
                        <!-- Methods Box -->
                        <rect x="0" y="115" width="180" height="55" fill="#f8f9fa" stroke="#bdc1c6" stroke-width="1" />
                        <text x="10" y="135" font-family="monospace" font-size="12" fill="#202124">+ login(): Boolean</text>
                        <text x="10" y="155" font-family="monospace" font-size="12" fill="#202124">+ updateProfile(): Void</text>
                    </g>

                    <!-- Class: Kamar (Bottom-Right) -->
                    <g transform="translate(460, 200)">
                        <!-- Header -->
                        <rect x="0" y="0" width="200" height="30" fill="#34a853" rx="4" ry="4" />
                        <text x="100" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Kamar</text>
                        <!-- Attributes Box -->
                        <rect x="0" y="30" width="200" height="95" fill="#f8f9fa" stroke="#bdc1c6" stroke-width="1" />
                        <text x="10" y="50" font-family="monospace" font-size="11" fill="#202124">- kamarId: String</text>
                        <text x="10" y="70" font-family="monospace" font-size="11" fill="#202124">- nomorKamar: String</text>
                        <text x="10" y="90" font-family="monospace" font-size="11" fill="#202124">- tipeKamar: String</text>
                        <text x="10" y="105" font-family="monospace" font-size="11" fill="#202124">- harga: Int</text>
                        <text x="10" y="120" font-family="monospace" font-size="11" fill="#202124">- tersedia: Boolean</text>
                        <!-- Methods Box -->
                        <rect x="0" y="125" width="200" height="55" fill="#f8f9fa" stroke="#bdc1c6" stroke-width="1" />
                        <text x="10" y="145" font-family="monospace" font-size="11" fill="#202124">+ cekKetersediaan(): Bool</text>
                        <text x="10" y="165" font-family="monospace" font-size="11" fill="#202124">+ updateStatus(): Void</text>
                    </g>

                    <!-- Class: Transaksi / Pemesanan (Center) -->
                    <g transform="translate(230, 160)">
                        <!-- Header -->
                        <rect x="0" y="0" width="200" height="30" fill="#ea4335" rx="4" ry="4" />
                        <text x="100" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Pemesanan</text>
                        <!-- Attributes Box -->
                        <rect x="0" y="30" width="200" height="125" fill="#f8f9fa" stroke="#bdc1c6" stroke-width="1" />
                        <text x="10" y="50" font-family="monospace" font-size="11" fill="#202124">- pemesananId: String</text>
                        <text x="10" y="70" font-family="monospace" font-size="11" fill="#202124">- userId: String</text>
                        <text x="10" y="90" font-family="monospace" font-size="11" fill="#202124">- kamarId: String</text>
                        <text x="10" y="110" font-family="monospace" font-size="11" fill="#202124">- tanggalMulai: String</text>
                        <text x="10" y="125" font-family="monospace" font-size="11" fill="#202124">- durasiBulan: Int</text>
                        <text x="10" y="140" font-family="monospace" font-size="11" fill="#202124">- totalHarga: Int</text>
                        <text x="10" y="150" font-family="monospace" font-size="11" fill="#202124">- status: String</text>
                        <!-- Methods Box -->
                        <rect x="0" y="155" width="200" height="70" fill="#f8f9fa" stroke="#bdc1c6" stroke-width="1" />
                        <text x="10" y="175" font-family="monospace" font-size="11" fill="#202124">+ buatPemesanan(): Bool</text>
                        <text x="10" y="195" font-family="monospace" font-size="11" fill="#202124">+ batalkanPemesanan(): Void</text>
                        <text x="10" y="210" font-family="monospace" font-size="11" fill="#202124">+ bayarPemesanan(): Void</text>
                    </g>

                    <!-- Relationships Arrows -->
                    <!-- Connection User -> Pemesanan -->
                    <!-- Path with polyline -->
                    <polyline points="130,210 130,250 230,250" fill="none" stroke="#5f6368" stroke-width="1.5" />
                    <!-- Multiplicity & Role -->
                    <text x="140" y="245" font-family="sans-serif" font-size="10" fill="#5f6368">1</text>
                    <text x="210" y="245" font-family="sans-serif" font-size="10" fill="#5f6368">1..*</text>
                    <text x="160" y="235" font-family="sans-serif" font-size="11" fill="#202124">melakukan</text>
                    <!-- Arrow head (open) -->
                    <polyline points="220,245 230,250 220,255" fill="none" stroke="#5f6368" stroke-width="1.5" />

                    <!-- Connection Pemesanan -> Kamar -->
                    <line x1="430" y1="280" x2="460" y2="280" stroke="#5f6368" stroke-width="1.5" />
                    <!-- Multiplicity & Role -->
                    <text x="435" y="275" font-family="sans-serif" font-size="10" fill="#5f6368">1..*</text>
                    <text x="450" y="275" font-family="sans-serif" font-size="10" fill="#5f6368">1</text>
                    <!-- Arrow head -->
                    <polyline points="450,275 460,280 450,285" fill="none" stroke="#5f6368" stroke-width="1.5" />
                    <text x="360" y="295" font-family="sans-serif" font-size="11" fill="#202124">memesan</text>
                </svg>
            </div>
        </div>

        <div class="footer">
            Halaman ini dihasilkan secara otomatis sebagai dokumentasi teknis Tugas Besar PBO.
        </div>
    </div>
</body>
</html>
